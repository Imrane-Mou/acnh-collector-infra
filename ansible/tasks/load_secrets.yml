---
# ─────────────────────────────────────────────
# Load long-lived secrets from OpenBAO.
# Short-lived DB creds come from group_vars/all/db_vars.yml
# (auto-generated by OpenTofu).
# ─────────────────────────────────────────────

- name: "Verify OPENBAO_TOKEN env var is set"
  ansible.builtin.assert:
    that:
      - lookup('env', 'OPENBAO_TOKEN') | length > 0
    fail_msg: >
      OPENBAO_TOKEN env var not set.
      Get a token from https://openbao.edu.forestier.re and export it.
  delegate_to: localhost
  run_once: true

- name: "Fetch secrets from OpenBAO"
  ansible.builtin.uri:
    url: "https://openbao.edu.forestier.re/v1/home/data/imrane.moumad"
    method: GET
    headers:
      X-Vault-Token: "{{ lookup('env', 'OPENBAO_TOKEN') }}"
    return_content: true
    status_code: 200
  register: bao_response
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "Set registry credentials from OpenBAO"
  ansible.builtin.set_fact:
    registry_user: "imrane.moumad"
    registry_password: "{{ bao_response.json.data.data.GITLAB_REGISTRY_TOKEN }}"
  no_log: true

- name: "Confirm secrets loaded"
  ansible.builtin.debug:
    msg:
      - "✅ Registry user: {{ registry_user }}"
      - "✅ DB host: {{ db_host }}"
      - "✅ DB name: {{ db_name }}"
      - "✅ DB user: {{ db_user }}"
      - "✅ All secrets loaded"
