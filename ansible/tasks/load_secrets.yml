---
# ─────────────────────────────────────────────
# Load all secrets from OpenBAO:
#   - GITLAB_REGISTRY_TOKEN (long-lived, from home/imrane.moumad)
#   - MYSQL_* (fresh on every tofu apply, from home/imrane.moumad/mysql)
# ─────────────────────────────────────────────

- name: "Verify OPENBAO_TOKEN env var is set"
  ansible.builtin.assert:
    that:
      - lookup('env', 'OPENBAO_TOKEN') | length > 0
    fail_msg: >
      OPENBAO_TOKEN env var not set.
      Get a token from https://openbao.edu.forestier.re and export it.
  delegate_to: localhost
  run_once: true

# ─── Registry token ────────────────────────────
- name: "Fetch registry token from OpenBAO"
  ansible.builtin.uri:
    url: "https://openbao.edu.forestier.re/v1/home/data/imrane.moumad"
    method: GET
    headers:
      X-Vault-Token: "{{ lookup('env', 'OPENBAO_TOKEN') }}"
    return_content: true
    status_code: 200
  register: bao_main
  delegate_to: localhost
  run_once: true
  no_log: true

# ─── MySQL credentials ─────────────────────────
- name: "Fetch MySQL credentials from OpenBAO"
  ansible.builtin.uri:
    url: "https://openbao.edu.forestier.re/v1/home/data/imrane.moumad/mysql"
    method: GET
    headers:
      X-Vault-Token: "{{ lookup('env', 'OPENBAO_TOKEN') }}"
    return_content: true
    status_code: 200
  register: bao_mysql
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "Set all facts from OpenBAO"
  ansible.builtin.set_fact:
    registry_user: "imrane.moumad"
    registry_password: "{{ bao_main.json.data.data.GITLAB_REGISTRY_TOKEN }}"
    db_host: "{{ bao_mysql.json.data.data.MYSQL_HOST }}"
    db_port: "{{ bao_mysql.json.data.data.MYSQL_PORT | default('3306') }}"
    db_name: "{{ bao_mysql.json.data.data.MYSQL_DATABASE }}"
    db_user: "{{ bao_mysql.json.data.data.MYSQL_USER }}"
    db_password: "{{ bao_mysql.json.data.data.MYSQL_PASSWORD }}"
  no_log: true

- name: "Confirm secrets loaded"
  ansible.builtin.debug:
    msg:
      - "✅ Registry user: {{ registry_user }}"
      - "✅ DB host: {{ db_host }}"
      - "✅ DB name: {{ db_name }}"
      - "✅ DB user: {{ db_user }}"
      - "✅ All secrets loaded"
