---
# ─────────────────────────────────────────────
# Deploy the Spring Boot backend container.
# Traefik routes `api.<user>.uca-devops.ovh` traffic to it.
# ─────────────────────────────────────────────

- name: "Pull the latest backend image"
  community.docker.docker_image:
    name: "{{ app_backend_image }}"
    source: pull
    force_source: true
  become: true

- name: "Deploy backend container"
  community.docker.docker_container:
    name: backend
    image: "{{ app_backend_image }}"
    restart_policy: unless-stopped
    state: started
    recreate: true
    networks:
      - name: "{{ app_docker_network }}"
    env:
      SPRING_DATASOURCE_URL: "jdbc:mariadb://{{ db_host }}:{{ db_port }}/{{ db_name }}"
      SPRING_DATASOURCE_USERNAME: "{{ db_user }}"
      SPRING_DATASOURCE_PASSWORD: "{{ db_password }}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "{{ app_docker_network }}"
      traefik.http.routers.backend.rule: "Host(`{{ app_domain_api }}`)"
      traefik.http.routers.backend.entrypoints: "web"
      traefik.http.services.backend.loadbalancer.server.port: "{{ app_backend_port | string }}"
  become: true
