---
# ─────────────────────────────────────────────
# Install Docker on the VM (Ubuntu)
# Idempotent: re-running this changes nothing if Docker is already installed.
# ─────────────────────────────────────────────

- name: "Install prerequisite packages for Docker"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
    state: present
    update_cache: true
  become: true

- name: "Create directory for Docker GPG key"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: "Add Docker official GPG key"
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  become: true

- name: "Add Docker apt repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: true
  become: true

- name: "Install Docker Engine + plugins"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true

- name: "Ensure Docker service is started and enabled"
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: "Add ubuntu user to the docker group"
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
  become: true

- name: "Install Python Docker SDK (required by docker_container module)"
  ansible.builtin.pip:
    name:
      - docker
      - requests
    state: present
    extra_args: --break-system-packages
  become: true

- name: "Reset SSH connection so 'ubuntu' picks up the docker group membership"
  ansible.builtin.meta: reset_connection
